services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datasus
      POSTGRES_USER: datasus
      POSTGRES_PASSWORD: datasus
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datasus"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: datasus/Dockerfile.api
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - filedata:/data
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: datasus/Dockerfile.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - filedata:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: datasus
      MB_DB_USER: datasus
      MB_DB_PASS: datasus
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  filedata:
