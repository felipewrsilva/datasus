services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datasus
      POSTGRES_USER: datasus
      POSTGRES_PASSWORD: datasus
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datasus"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: datasus/Dockerfile.api
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - filedata:/data
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: datasus/Dockerfile.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - filedata:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api
    restart: unless-stopped

  # Ensures Postgres has a dedicated DB for Metabase app metadata (keeps pipeline tables in `datasus` only).
  metabase-db-init:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: datasus
    entrypoint:
      - sh
      - -c
      - |
        until psql -h db -U datasus -d postgres -c '\q' 2>/dev/null; do sleep 1; done
        if ! psql -h db -U datasus -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'metabase'" | grep -q 1; then
          psql -h db -U datasus -d postgres -c "CREATE DATABASE metabase;"
        fi
        psql -h db -U datasus -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE metabase TO datasus;"
    restart: "no"

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_CONNECTION_URI: jdbc:postgresql://db:5432/metabase?user=datasus&password=datasus&sslmode=disable
      MB_SITE_URL: http://localhost:3001
      MB_SITE_NAME: DATASUS Analytics
      MB_ANON_TRACKING_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
      metabase-db-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  filedata:
